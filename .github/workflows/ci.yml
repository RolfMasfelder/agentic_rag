name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install ruff
        run: pip install ruff

      - name: ruff check
        run: ruff check .

      - name: ruff format
        run: ruff format --check .

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: agentic_rag_test
          POSTGRES_USER: rag_user
          POSTGRES_PASSWORD: ci-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DJANGO_SECRET_KEY: ci-only-secret-not-for-production
      DEBUG: "True"
      DB_NAME: agentic_rag_test
      DB_USER: rag_user
      DB_PASSWORD: ci-password
      DB_HOST: localhost
      DB_PORT: "5432"
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      OLLAMA_BASE_URL: http://localhost:11434
      OLLAMA_EMBED_MODEL: nomic-embed-text
      OLLAMA_CHAT_MODEL: qwen2.5:7b
      EMBEDDING_DIM: "768"
      PYTHONPATH: django_root

    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: sudo apt-get install -y --no-install-recommends libmagic1

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Django system check
        run: python django_root/manage.py check

      - name: Run migrations
        run: python django_root/manage.py migrate

      - name: Run tests
        run: pytest --cov --cov-report=term-missing || [[ $? -eq 5 ]]
