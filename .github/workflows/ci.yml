name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install ruff
        run: pip install ruff

      - name: ruff check
        run: ruff check .

      - name: ruff format
        run: ruff format --check .

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: agentic_rag_test
          POSTGRES_USER: rag_user
          POSTGRES_PASSWORD: ci-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # PYTHONPATH is not in .env.example but required for all Python steps.
      # All other env vars are loaded from .env.example in the first step below,
      # so that new variables in .env.example are picked up automatically.
      PYTHONPATH: django_root

    steps:
      - uses: actions/checkout@v7

      - name: Load env from .env.example with CI overrides
        run: |
          # Load .env.example as defaults (skip comments, empty lines, and
          # placeholder values like http://<host>:port).
          while IFS= read -r line || [[ -n "$line" ]]; do
            [[ "$line" =~ ^[[:space:]]*# ]] && continue
            [[ -z "${line//[[:space:]]/}" ]] && continue
            key="${line%%=*}"
            value="${line#*=}"
            [[ "$value" == *"<"*">"* ]] && continue
            echo "$key=$value" >> "$GITHUB_ENV"
          done < .env.example
          # CI-specific overrides (must match the postgres service credentials above)
          {
            echo "DJANGO_SECRET_KEY=ci-only-secret-not-for-production"
            echo "DB_HOST=localhost"
            echo "DB_NAME=agentic_rag_test"
            echo "DB_PASSWORD=ci-password"
            echo "OLLAMA_BASE_URL=http://localhost:11434"
          } >> "$GITHUB_ENV"

      - name: Install system dependencies
        run: sudo apt-get install -y --no-install-recommends libmagic1

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Django system check
        run: python django_root/manage.py check

      - name: Run migrations
        run: python django_root/manage.py migrate

      - name: Run tests
        run: pytest --cov --cov-report=term-missing || [[ $? -eq 5 ]]
