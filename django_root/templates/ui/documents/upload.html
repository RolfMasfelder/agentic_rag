{% extends "ui/base.html" %}
{% block title %}Dokument hochladen – Agentic RAG{% endblock %}

{% block content %}
<div class="mb-6">
  <nav class="text-sm text-gray-500 mb-2">
    <a href="{% url 'ui:document_list' %}" class="hover:text-indigo-600">Dokumente</a>
    <span class="mx-2">›</span>
    <span>Hochladen</span>
  </nav>
  <h1 class="text-2xl font-bold text-gray-900">Dokument hochladen</h1>
</div>

<div class="bg-white rounded-xl border border-gray-200 p-6 max-w-xl">
  <form method="post" enctype="multipart/form-data" class="space-y-5">
    {% csrf_token %}

    <div>
      <label for="id_title" class="block text-sm font-medium text-gray-700 mb-1">Titel *</label>
      <input type="text" name="title" id="id_title" required placeholder="Beschreibender Titel des Dokuments"
             class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
    </div>

    <div>
      <label for="id_file" class="block text-sm font-medium text-gray-700 mb-1">Datei *</label>
      <input type="file" name="file" id="id_file" required
             class="w-full text-sm text-gray-600 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
    </div>

    <div>
      <label for="id_file_type" class="block text-sm font-medium text-gray-700 mb-1">Dateityp</label>
      <select name="file_type" id="id_file_type"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-indigo-400">
        {% for value, label in filetype_choices %}
        <option value="{{ value }}">{{ label }}</option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label for="id_chunker" class="block text-sm font-medium text-gray-700 mb-1">Chunking-Strategie</label>
      <select name="chunker" id="id_chunker"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-indigo-400">
        {% for value, label in chunker_choices %}
        <option value="{{ value }}">{{ label }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="flex gap-3 pt-2">
      <button type="submit"
              class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg text-sm font-medium transition-colors">
        Hochladen & Verarbeiten
      </button>
      <a href="{% url 'ui:document_list' %}"
         class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-5 py-2 rounded-lg text-sm font-medium transition-colors">
        Abbrechen
      </a>
    </div>
  </form>
</div>
{% endblock %}
