<!DOCTYPE html>
<html lang="de" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anmelden – Agentic RAG</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full flex items-center justify-center bg-gradient-to-br from-indigo-50 to-gray-100">
  <div class="w-full max-w-sm">
    <div class="bg-white rounded-2xl shadow-lg px-8 py-10">
      <div class="text-center mb-8">
        <div class="text-5xl mb-3">🔍</div>
        <h1 class="text-2xl font-bold text-gray-900">Agentic RAG</h1>
        <p class="text-sm text-gray-500 mt-1">Bitte anmelden</p>
      </div>

      {% if form.non_field_errors %}
      <div class="bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-3 rounded-lg mb-4">
        {{ form.non_field_errors|first }}
      </div>
      {% endif %}

      <form method="post" class="space-y-5">
        {% csrf_token %}
        <div>
          <label for="id_username" class="block text-sm font-medium text-gray-700 mb-1">Benutzername</label>
          <input type="text" name="username" id="id_username" required autofocus
                 value="{{ form.username.value|default:'' }}"
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
          {% if form.username.errors %}
          <p class="text-red-600 text-xs mt-1">{{ form.username.errors|first }}</p>
          {% endif %}
        </div>
        <div>
          <label for="id_password" class="block text-sm font-medium text-gray-700 mb-1">Passwort</label>
          <input type="password" name="password" id="id_password" required
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
        </div>
        <input type="hidden" name="next" value="{{ next }}">
        <button type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 px-4 rounded-lg font-medium text-sm transition-colors">
          Anmelden
        </button>
      </form>
    </div>
    <p class="text-center text-xs text-gray-400 mt-4">Agentic RAG &middot; Django 5.2</p>
  </div>
</body>
</html>
