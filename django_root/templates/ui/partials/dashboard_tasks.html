{% if active_tasks is None %}
<p class="text-sm text-gray-400 italic">Broker nicht erreichbar – Task-Status nicht verfügbar.</p>
{% elif not active_tasks %}
<p class="text-sm text-gray-500">Keine aktiven Jobs.</p>
{% else %}
<div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
  <table class="min-w-full text-sm">
    <thead>
      <tr class="bg-gray-50 text-left text-xs font-medium text-gray-500 uppercase tracking-wide">
        <th class="px-5 py-2">Task</th>
        <th class="px-5 py-2">ID</th>
        <th class="px-5 py-2">Worker</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-gray-100">
      {% for task in active_tasks %}
      <tr>
        <td class="px-5 py-2.5 font-medium text-gray-800">{{ task.name }}</td>
        <td class="px-5 py-2.5 text-gray-400 font-mono text-xs">{{ task.id|truncatechars:16 }}</td>
        <td class="px-5 py-2.5 text-gray-500 text-xs">{{ task.hostname|default:"–" }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endif %}
